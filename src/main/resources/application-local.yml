# 로컬 개발 — Docker 컨테이너 연결
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/fillmap
    username: user
    password: user1234
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    show-sql: true                 # 로컬에서만 SQL 출력

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    org.flywaydb: INFO
    com.momentmap: DEBUG